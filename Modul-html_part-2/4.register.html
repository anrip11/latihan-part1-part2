<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
  </head>
  <body>
    <form>
      <fieldset>
        <legend>Register</legend>
        <!-- Input nama lengkap-->
        <label for="nama_lengkap">Nama Lengkap : </label
        ><input
          type="text"
          name="nama_lengkap"
          placeholder="isi nama lengkap anda.."
          required
        />
        <br />
        <!-- Input email-->
        <label for="email">Email : </label
        ><input
          type="text"
          name="email"
          placeholder="isi email anda.."
          required
        />
        <br />
        <!-- Input Password-->
        <label for="password">Password : </label
        ><input
          type="password"
          name="password"
          placeholder="isi password anda.."
          required
        />
        <br />
        <!-- Radio button - pilih jenis kelamin -->
        <label for="jenis_kelamin">Jenis Kelamin : </label>
        <input type="radio" name="jenis_kelamin" value="laki-laki" /><label
          for="jenis_kelamin"
          >laki-laki</label
        >
        <input type="radio" name="jenis_kelamin" value="perempuan" /><label
          for="jenis_kelamin"
          >perempuan</label
        >
        <br />
        <!-- Checkbox - minat belajar -->
        <label for="minat_belajar">Minat Belajar : </label>
        <input type="checkbox" value="HTML" /><label for="">HTML</label>
        <input type="checkbox" value="CSS" /><label for="">CSS</label>
        <input type="checkbox" value="JS" /><label for="">JS</label>
        <br />
        <!-- Dropdown - pilih domisili -->
        <select>
          <option disabled selected>pilih Domisili</option>
          <option value="DKI Jakarta">DKI Jakarta</option>
          <option value="Jawa Barat">Jawa Barat</option>
          <option value="Jawa Tengah ">Jawa Tengah</option>
          <option value="Jawa Timur">Jawa Timur</option>
        </select>
        <br />
        <button type="submit">Kirim</button>
      </fieldset>
    </form>
  </body>
</html>
